<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TruthTrace</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:380px; font-family:'Noto Sans SC',system-ui,sans-serif; font-size:13px; color:#1a1a2e; background:#fff; }
  .header { background:linear-gradient(135deg,#2563eb,#1d4ed8); color:white; padding:16px; text-align:center; }
  .header h1 { font-size:18px; font-weight:700; }
  .header p { font-size:11px; opacity:0.85; margin-top:2px; }
  .section { padding:12px 16px; }
  .input-row { display:flex; gap:8px; }
  input { flex:1; padding:8px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:12px; outline:none; }
  input:focus { border-color:#2563eb; box-shadow:0 0 0 2px rgba(37,99,235,0.1); }
  .btn { padding:8px 16px; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .btn-primary { background:#2563eb; color:white; }
  .btn-primary:hover { background:#1d4ed8; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .result { padding:12px 16px; border-top:1px solid #f3f4f6; }
  .verdict-badge { display:inline-block; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:700; }
  .score { font-size:28px; font-weight:800; }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:600; margin:2px; }
  .loading { text-align:center; padding:20px; color:#6b7280; }
  .error { padding:12px; margin:12px; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; color:#991b1b; font-size:12px; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid #e5e7eb; border-top-color:#2563eb; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  a { color:#2563eb; text-decoration:none; font-size:11px; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="header">
  <h1>🛡️ TruthTrace</h1>
  <p>信息可信度即时检测</p>
</div>

<div class="section">
  <div class="input-row">
    <input type="text" id="urlInput" placeholder="粘贴链接或自动检测当前页面...">
    <button class="btn btn-primary" id="analyzeBtn">分析</button>
  </div>
  <div style="margin-top:8px">
    <button class="btn" style="background:#f3f4f6;width:100%" id="analyzePageBtn">📋 分析当前页面</button>
    <a href="http://localhost:5173" target="_blank" style="display:block;text-align:center;margin-top:8px">打开 TruthTrace 完整版 →</a>
  </div>
</div>

<div id="result"></div>

<script src="popup.js"></script>
</body>
</html>
