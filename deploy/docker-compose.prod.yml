# TruthTrace 生产环境 Docker Compose
# 使用: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d

version: "3.9"

services:
  # =========================================================================
  # 数据库
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: truthtrace
      POSTGRES_USER: truthtrace
      POSTGRES_PASSWORD: ${DB_PASSWORD:-truthtrace_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/backup:/backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthtrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.15.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }

  # =========================================================================
  # 后端
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  # =========================================================================
  # 前端
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
    environment:
      - VITE_API_BASE_URL=https://truthtrace.app
      - VITE_WS_URL=wss://truthtrace.app
    restart: unless-stopped

  # =========================================================================
  # 反向代理
  # =========================================================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  esdata:
