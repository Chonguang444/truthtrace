# TruthTrace 生产环境 Docker Compose — 8 容器全栈
# 使用: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
# 前置: SSL 证书 + .env 配置

services:
  # =========================================================================
  # 数据库
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: truthtrace
      POSTGRES_USER: truthtrace
      POSTGRES_PASSWORD: ${DB_PASSWORD:-truthtrace_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/backup:/backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthtrace"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 128M }

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =========================================================================
  # 后端
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits: { memory: 1G }
        reservations: { memory: 256M }

  worker:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --time-limit=600 --soft-time-limit=540 --max-tasks-per-child=50
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://truthtrace:${DB_PASSWORD}@postgres:5432/truthtrace
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENV=production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  # =========================================================================
  # 前端（生产静态构建 + Nginx 直接服务）
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=https://truthtrace.app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # =========================================================================
  # 反向代理（生产 Nginx 配置）
  # =========================================================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health-check || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redisdata:
  esdata:
