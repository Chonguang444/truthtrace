# TruthTrace Nginx 反向代理配置
# 用途: HTTPS 终止 + 静态资源缓存 + API 代理 + WebSocket 代理

upstream backend {
    server 127.0.0.1:8000;
}

upstream frontend {
    server 127.0.0.1:5173;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name truthtrace.app www.truthtrace.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name truthtrace.app www.truthtrace.app;

    # SSL 证书
    ssl_certificate     /etc/letsencrypt/live/truthtrace.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truthtrace.app/privkey.pem;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/truthtrace_access.log;
    error_log  /var/log/nginx/truthtrace_error.log;

    # 客户端限制
    client_max_body_size 20M;
    client_body_timeout 30s;

    # ===================================================================
    # API (含 WebSocket 代理)
    # ===================================================================
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;  # 长连接用于 WebSocket 和长时间溯源

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===================================================================
    # 前端静态资源
    # ===================================================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ===================================================================
    # 静态文件: manifest / sw.js / icons
    # ===================================================================
    location = /manifest.json {
        proxy_pass http://frontend;
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        proxy_pass http://frontend;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }
}
