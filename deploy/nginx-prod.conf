# TruthTrace Nginx 反向代理 — 生产加固
#
# 特性:
# - HTTP/2 + TLS 1.3
# - OCSP Stapling + HSTS preload
# - Brotli/gzip 压缩
# - 速率限制 (API + login)
# - 静态资源长期缓存 + 版本化
# - WebSocket 代理
# - 基本 WAF 规则
# - Let's Encrypt ACME 集成
# - SPA 路由 (所有非 /api/ 路径回退到 index.html)
#
# 部署:
#   cp nginx-prod.conf /etc/nginx/sites-available/truthtrace
#   ln -s /etc/nginx/sites-available/truthtrace /etc/nginx/sites-enabled/
#   certbot --nginx -d truthtrace.app -d www.truthtrace.app
#   nginx -t && systemctl reload nginx

# ============================================================================
# 限流定义
# ============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ============================================================================
# 上游定义
# ============================================================================
upstream backend {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream frontend {
    server 127.0.0.1:5173 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================================================
# HTTP → HTTPS 强制重定向
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name truthtrace.app www.truthtrace.app;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS 主服务
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name truthtrace.app www.truthtrace.app;

    # --- SSL/TLS 配置 ---
    ssl_certificate     /etc/letsencrypt/live/truthtrace.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/truthtrace.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/truthtrace.app/chain.pem;

    # 现代 TLS 配置 (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- 安全头 ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # --- 日志 ---
    access_log /var/log/nginx/truthtrace_access.log combined buffer=16k;
    error_log  /var/log/nginx/truthtrace_error.log warn;

    # --- 客户端限制 ---
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 10s;
    limit_conn conn_per_ip 20;

    # --- 压缩 (Brotli > gzip) ---
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ====================================================================
    # API 路由
    # ====================================================================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # WebSocket (需要时升级)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 隐藏后端头
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # 登录端点额外限流
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 搜索端点限流
    location /api/search {
        limit_req zone=search_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ====================================================================
    # 前端 SPA (生产构建后的静态文件)
    # ====================================================================
    root /app/frontend/dist;
    index index.html;

    # 带 hash 的静态资源 — 长期缓存
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # Service Worker & Manifest — 不缓存
    location = /sw.js {
        add_header Cache-Control "no-cache, max-age=0";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache, max-age=0";
        try_files $uri =404;
    }

    # SPA 回退 — 所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ====================================================================
    # 健康检查 (不记录日志)
    # ====================================================================
    location = /health-check {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ====================================================================
    # 基本 WAF: 阻止恶意请求
    # ====================================================================
    # 阻止 CGI/脚本扫描
    location ~* \.(cgi|pl|asp|aspx|jsp|php|py|rb|sh)$ {
        return 403;
    }

    # 阻止常见攻击路径
    location ~* /(wp-admin|wp-login|wp-content|xmlrpc\.php|\.env|\.git|\.hg) {
        return 403;
    }

    # 阻止 . 开头的隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 阻止无 Host 头的请求
    if ($host = "") {
        return 400;
    }
}
