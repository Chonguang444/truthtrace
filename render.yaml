# Render Blueprint — 一键部署 TruthTrace v3.0 全套服务
# 用法: Render Dashboard → Blueprints → Connect GitHub Repo
# 文档: https://render.com/docs/blueprint-spec

services:
  # =========================================================================
  # FastAPI 后端 (Web Service)
  # =========================================================================
  - type: web
    name: truthtrace-api
    env: python
    region: singapore
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      # Render 提供的 DATABASE_URL 是 postgresql:// 格式
      # SQLAlchemy async 需要 postgresql+asyncpg:// 格式
      export DATABASE_URL=$(echo $DATABASE_URL | sed 's/^postgresql:/postgresql+asyncpg:/')
      export DATABASE_URL_SYNC=$(echo $DATABASE_URL | sed 's/^postgresql+asyncpg:/postgresql:/')
      python -m alembic upgrade head
      uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truthtrace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://truthtrace-alpha.vercel.app"
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
    healthCheckPath: /api/health
    autoDeploy: true

  # =========================================================================
  # Celery Worker (后台异步任务)
  # =========================================================================
  - type: worker
    name: truthtrace-worker
    env: python
    region: singapore
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      export DATABASE_URL=$(echo $DATABASE_URL | sed 's/^postgresql:/postgresql+asyncpg:/')
      celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 --time-limit=600 --soft-time-limit=540 --max-tasks-per-child=50
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truthtrace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: truthtrace-db
    plan: free
    databaseName: truthtrace
    user: truthtrace

  - name: truthtrace-redis
    plan: free
    ipAllowList: []
