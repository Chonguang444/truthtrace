# Render Blueprint — TruthTrace v3.0
# 用法: Render Dashboard → Blueprints → New Blueprint Instance → 连接仓库
# 参考: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: truthtrace-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truthtrace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: truthtrace-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://truthtrace-alpha.vercel.app"
      - key: DEBUG
        value: "false"

databases:
  - name: truthtrace-db
    plan: free
    databaseName: truthtrace
    user: truthtrace

  - name: truthtrace-redis
    plan: free
    ipAllowList: []
